<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>奥力给能量站 · 每日汇报</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #fce9e0 0%, #fdf4ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #4a3b32;
        }
        .report-card {
            max-width: 860px;
            width: 100%;
            background: rgba(255, 250, 245, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -8px rgba(140, 90, 60, 0.12);
            padding: 32px 28px;
            border: 1px solid #ffe8d9;
            position: relative;
        }
        /* 提交成功动画层 */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .success-animation {
            font-size: 15rem;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.2); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .greeting-box {
            background: #fff0e8;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: 600;
            color: #7a5340;
            font-size: 1rem;
        }
        .easter-egg-area { display: flex; align-items: center; gap: 10px; }
        .poke-icon {
            font-size: 2rem; cursor: pointer; transition: transform 0.2s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }
        .poke-icon:active { transform: scale(0.9); }
        .poke-toast {
            background: #b47a68; color: white; padding: 8px 16px;
            border-radius: 50px; font-weight: 500; opacity: 0;
            transition: opacity 0.2s; pointer-events: none;
        }
        .header-section {
            margin-bottom: 20px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap;
        }
        .title-group h1 { font-size: 2.2rem; font-weight: 600; color: #6e4f3a; }
        .date-badge {
            background: #ffeadd; padding: 8px 18px; border-radius: 60px;
            color: #7a5a4a; font-weight: 500;
        }
        /* 天气卡片 */
        .weather-card {
            background: #d9e6f2; border-radius: 28px; padding: 16px 20px;
            margin-bottom: 24px; border: 1px solid #b8d0e0;
            display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
        }
        .weather-icon { font-size: 2.5rem; margin-right: 8px; }
        .weather-info { flex: 1; }
        .weather-temp { font-size: 1.8rem; font-weight: 700; }
        .weather-desc { color: #3a5a6e; }
        .clothes-tip {
            background: #fdf8f2; padding: 8px 18px; border-radius: 40px;
            font-weight: 500; color: #5f4a3c;
        }
        /* 喝水打卡 */
        .water-section {
            background: #e4f2fe; border-radius: 32px; padding: 18px 20px;
            margin-bottom: 24px; border: 1px solid #bdd8ec;
        }
        .water-title { font-weight: 600; margin-bottom: 12px; display: flex; gap: 10px; }
        .cups-container { display: flex; gap: 12px; flex-wrap: wrap; }
        .cup {
            font-size: 2rem; cursor: pointer; opacity: 0.4;
            transition: opacity 0.2s, transform 0.1s;
        }
        .cup.filled { opacity: 1; color: #3a8fc2; }
        .cup:hover { transform: scale(1.1); }
        /* 心情面板等保持不变 */
        .mood-panel {
            background: #fff7f0; border-radius: 36px; padding: 20px 22px;
            margin-bottom: 28px; border: 1px solid #ffdcc8;
            display: flex; flex-wrap: wrap; align-items: center; gap: 16px 24px;
        }
        .mood-gauge-wrap { display: flex; align-items: center; gap: 10px; min-width: 200px; }
        .gauge-container { width: 120px; height: 60px; }
        canvas#moodGauge { display: block; width: 100%; height: auto; }
        .mood-value-large { font-size: 2.2rem; font-weight: 700; color: #8b5e4b; }
        .mood-category-badge {
            font-size: 1rem; font-weight: 600; padding: 6px 14px;
            border-radius: 60px; background: #fce2d4; color: #6b4226;
        }
        .slider-block { flex: 1; min-width: 180px; }
        .slider-block input { width: 100%; accent-color: #e07c6c; }
        .mood-hint { font-size: 0.75rem; color: #b28b7a; margin-top: 4px; }
        .last-mood-note { margin-top: 8px; font-size: 0.9rem; color: #b37b64; font-weight: 500; }
        /* 用餐区省略，与之前一致，只做微调 */
        .meal-section { margin: 20px 0 24px; }
        .section-title { font-size: 1.6rem; font-weight: 600; color: #7b5a48; margin-bottom: 18px; }
        .meal-card {
            background: #fffbf8; border-radius: 28px; padding: 18px 20px;
            margin-bottom: 16px; border: 1px solid #ffddd0;
        }
        .meal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .meal-name { font-size: 1.3rem; font-weight: 600; color: #5f4538; }
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn {
            background: #f4e9e2; border: none; color: #7a5a4a; padding: 8px 16px;
            border-radius: 50px; font-weight: 600; cursor: pointer; border: 1px solid #eed9cc;
        }
        .toggle-btn.active { background: #c98b7a; border-color: #b16f5e; color: white; }
        .meal-detail-input {
            margin-top: 14px; display: flex; align-items: center; gap: 8px;
            background: #fff5ee; padding: 4px 16px 4px 12px; border-radius: 50px;
            border: 1px solid #ffddd0;
        }
        .meal-detail-input input {
            width: 100%; border: none; background: transparent; padding: 12px 0;
            font-size: 1rem; font-family: 'Quicksand', sans-serif; outline: none;
        }
        .night-snack-row {
            background: #fff7f2; border-radius: 28px; padding: 16px 20px;
            margin-top: 8px; border: 1px dashed #e6bfaf;
        }
        .whisper-box {
            margin: 24px 0 20px; background: #fff2e9; border-radius: 32px;
            padding: 18px 22px; border: 1px solid #ffd6c2;
        }
        .whisper-box textarea {
            width: 100%; border: 1px solid #f0cdbc; border-radius: 24px;
            padding: 14px 18px; font-family: 'Quicksand', sans-serif;
            min-height: 80px; background: white; resize: vertical;
        }
        .submit-area { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
        .btn-primary {
            background: #b47a68; color: white; border: none; padding: 18px 36px;
            border-radius: 80px; font-weight: 700; font-size: 1.2rem;
            box-shadow: 0 12px 20px -5px rgba(170, 100, 70, 0.2);
            cursor: pointer; transition: all 0.2s; border: 1px solid #d9a28e;
        }
        .btn-primary:hover { background: #9d6655; transform: translateY(-3px); }
        .form-status {
            font-size: 1.1rem; font-weight: 500; color: #8b6b5c;
            background: #fff1e7; padding: 8px 20px; border-radius: 60px;
        }
        .stats-footer { margin-top: 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-top: 1px dashed #f0cfbe; padding-top: 18px; }
        .streak-info { font-weight: 600; color: #8b5e4b; }
        .calendar-mini { background: #fffaf5; border-radius: 30px; padding: 14px 16px; margin-top: 16px; border: 1px solid #ffddd0; }
        .calendar-title { font-weight: 600; margin-bottom: 8px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-day { padding: 6px 0; border-radius: 20px; background: #f5e6de; font-weight: 500; color: #624b3e; }
        .cal-day.checked { background: #d48d7a; color: white; }
        .footer-note { margin-top: 16px; text-align: center; color: #b29282; }
    </style>
</head>
<body>
<div class="success-overlay" id="successOverlay">
    <div class="success-animation">👌</div>
</div>
<div class="report-card">
    <!-- 顶部问候与彩蛋 -->
    <div class="top-bar">
        <div class="greeting-box" id="greetingMsg">加载问候...</div>
        <div class="easter-egg-area">
            <span class="poke-icon" id="pokeTrigger" title="戳我！">🏀</span>
            <span class="poke-toast" id="pokeToast"></span>
        </div>
    </div>

    <div class="header-section">
        <div class="title-group">
            <h1>🏀 奥力给能量站</h1>
            <span style="font-size:0.9rem; color:#a58373;">记录今日奥力给</span>
        </div>
        <div class="date-badge" id="todayDate"></div>
    </div>

    <!-- 天气卡片 -->
    <div class="weather-card" id="weatherBox">
        <div class="weather-icon" id="weatherIcon">☀️</div>
        <div class="weather-info">
            <div><span class="weather-temp" id="weatherTemp">--°C</span> <span id="weatherCity">加载中...</span></div>
            <div class="weather-desc" id="weatherDesc">获取天气...</div>
        </div>
        <div class="clothes-tip" id="clothesTip">--</div>
    </div>

    <!-- 喝水打卡 -->
    <div class="water-section">
        <div class="water-title"><i class="fas fa-tint" style="color:#3a8fc2;"></i> 今日喝水打卡 <span id="waterCountDisplay">0/8</span></div>
        <div class="cups-container" id="cupsContainer"></div>
    </div>

    <!-- 心情仪表 -->
    <div class="mood-panel">
        <div class="mood-gauge-wrap">
            <div class="gauge-container"><canvas id="moodGauge" width="120" height="60"></canvas></div>
            <div class="mood-info">
                <span class="mood-value-large" id="moodPercent">72%</span>
                <span class="mood-category-badge" id="moodCategory">开心</span>
            </div>
        </div>
        <div class="slider-block">
            <label><i class="far fa-smile-wink"></i> 拖动调节心情</label>
            <input type="range" id="moodSlider" min="0" max="100" value="72" step="1">
            <div class="mood-hint">0-10% 不开心 · 11-30% 一般 · 31-50% 不错 · 51-70% 开心 · 71-100% 完美</div>
            <div class="last-mood-note" id="lastMoodNote"></div>
        </div>
    </div>

    <!-- 用餐区（早餐午餐晚餐夜宵）与之前一致，省略重复样式，直接复制之前的HTML结构 -->
    <div class="meal-section">
        <div class="section-title"><i class="fas fa-utensils"></i> 今天吃了什么？</div>
        <div class="meal-card">
            <div class="meal-header"><span class="meal-name"><i class="fas fa-sun" style="color:#f4a261;"></i> 早餐</span>
                <div class="toggle-group" data-meal="breakfast"><span class="toggle-btn active" data-value="yes">吃了 ✓</span><span class="toggle-btn" data-value="no">没吃</span></div>
            </div>
            <div class="meal-detail-input"><i class="fas fa-pen"></i><input type="text" id="breakfastDetail" placeholder="比如：三明治、牛奶..." maxlength="30"></div>
        </div>
        <div class="meal-card">
            <div class="meal-header"><span class="meal-name"><i class="fas fa-cloud-sun" style="color:#e09f5c;"></i> 午餐</span>
                <div class="toggle-group" data-meal="lunch"><span class="toggle-btn active" data-value="yes">吃了 ✓</span><span class="toggle-btn" data-value="no">没吃</span></div>
            </div>
            <div class="meal-detail-input"><i class="fas fa-pen"></i><input type="text" id="lunchDetail" placeholder="比如：牛肉饭、沙拉..." maxlength="30"></div>
        </div>
        <div class="meal-card">
            <div class="meal-header"><span class="meal-name"><i class="fas fa-moon" style="color:#8f7a9b;"></i> 晚餐</span>
                <div class="toggle-group" data-meal="dinner"><span class="toggle-btn active" data-value="yes">吃了 ✓</span><span class="toggle-btn" data-value="no">没吃</span></div>
            </div>
            <div class="meal-detail-input"><i class="fas fa-pen"></i><input type="text" id="dinnerDetail" placeholder="比如：意面、汤..." maxlength="30"></div>
        </div>
        <div class="night-snack-row">
            <div class="snack-header"><label><input type="checkbox" id="nightSnackCheck"> <i class="fas fa-cookie-bite"></i> 偷偷吃宵夜了没？</label></div>
            <div class="meal-detail-input" style="margin-top:10px;"><i class="fas fa-pen"></i><input type="text" id="nightSnackDetail" placeholder="比如：酸奶、水果..." maxlength="30" disabled></div>
        </div>
    </div>

    <!-- 悄悄话 -->
    <div class="whisper-box">
        <label><i class="fas fa-feather-alt"></i> 想你</label>
        <textarea id="whisperMessage" placeholder="写点什么吧，比如“今天天气很好，想你”..."></textarea>
    </div>

    <!-- 提交区 -->
    <div class="submit-area">
        <button class="btn-primary" id="submitReportBtn"><i class="fas fa-paper-plane"></i> 赶紧把检讨交了</button>
        <span class="form-status" id="formStatus"></span>
    </div>

    <!-- 统计与日历 -->
    <div class="stats-footer">
        <div class="streak-info" id="streakDisplay">加载天数...</div>
        <div style="color:#a58373;"><i class="far fa-calendar-check"></i> 本月打卡</div>
    </div>
    <div class="calendar-mini" id="calendarBox">
        <div class="calendar-title">📅 本月汇报日历</div>
        <div id="calendarGrid" class="calendar-grid"></div>
    </div>
    <div class="footer-note">⚡ 点击提交后会出现幸运签和动画哦～</div>
</div>

<script>
    (function(){
        "use strict";
        // ---------- 自定义文案库 ----------
        const GREETINGS = {
            morning: ["奥力给了兄弟们", "今天不准吃奥里给", "今天可以吃奥力给呦，又给你爽到了（彩蛋）"],
            afternoon: ["刚醒吧，又爽了，牛逼", "下次早点醒，早上的问候有惊喜，每天不重样，看你能不能刷到彩蛋", "今天的你也在闪闪发光"],
            evening: ["晚间问候，没睡吧，牛逼", "辛苦啦，抱抱～", "月亮不睡你不睡，你是大傻逼"]
        };
        const POKE_MESSAGES = ["滚就行了（彩蛋）", "戳一次=亲一口 💋", "戳坏了要赔的哦～", "第N次被戳，好幸福", "这里也有一个小彩蛋呦", "再戳我就把你吃掉！", "叮！收到一份想念～"];
        const FORTUNE_MESSAGES = ["什么都没有", "滚", "滚就行了", "宜：吃甜食 🍰", "想吃什么", "奖励一顿奥利给", "奖励一顿给你做好吃的", "今天会有小惊喜（滚）", "芜湖", "宜：早点睡觉"];
        const LAST_MOOD_TEXT = "又给你爽到了";
        const STREAK_TEXT = "还是你牛逼，有恒心啊🌱";

        // ---------- 基础设置 ----------
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2,'0');
        const d = String(today.getDate()).padStart(2,'0');
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        const wd = weekdays[today.getDay()];
        document.getElementById('todayDate').textContent = `${y}.${m}.${d} ${wd}`;
        const todayStr = `${y}-${m}-${d}`;

        // 随机问候
        const hour = today.getHours();
        let greetArr = hour>=5&&hour<12 ? GREETINGS.morning : (hour>=12&&hour<18 ? GREETINGS.afternoon : GREETINGS.evening);
        document.getElementById('greetingMsg').textContent = greetArr[Math.floor(Math.random()*greetArr.length)];

        // 戳戳乐
        const pokeToast = document.getElementById('pokeToast');
        document.getElementById('pokeTrigger').addEventListener('click', ()=>{
            pokeToast.style.opacity='1';
            pokeToast.textContent = POKE_MESSAGES[Math.floor(Math.random()*POKE_MESSAGES.length)];
            setTimeout(()=>pokeToast.style.opacity='0',2000);
        });

        // ---------- 天气 (需替换API Key) ----------
        const WEATHER_API_KEY = 'ee4e5f763f4041b24acfd8ac233a3548'; // 请替换为OpenWeatherMap的API Key
        async function fetchWeather() {
            const weatherBox = document.getElementById('weatherBox');
            if (WEATHER_API_KEY === '你的API_KEY') {
                document.getElementById('weatherCity').textContent = '未配置Key';
                document.getElementById('weatherTemp').textContent = '--°C';
                document.getElementById('weatherDesc').textContent = '请设置API Key';
                document.getElementById('clothesTip').textContent = '天气不可用';
                return;
            }
            try {
                // 尝试获取地理位置
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                });
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric&lang=zh_cn`;
                const res = await fetch(url);
                const data = await res.json();
                updateWeatherUI(data);
            } catch (e) {
                console.warn('定位失败，使用默认城市北京');
                try {
                    const url = `https://api.openweathermap.org/data/2.5/weather?q=Beijing&appid=${WEATHER_API_KEY}&units=metric&lang=zh_cn`;
                    const res = await fetch(url);
                    const data = await res.json();
                    updateWeatherUI(data);
                } catch (e2) {
                    document.getElementById('weatherCity').textContent = '获取失败';
                }
            }
        }
        function updateWeatherUI(data) {
            if (data.cod !== 200) return;
            const temp = Math.round(data.main.temp);
            const desc = data.weather[0].description;
            const iconCode = data.weather[0].icon;
            const city = data.name;
            document.getElementById('weatherTemp').textContent = `${temp}°C`;
            document.getElementById('weatherDesc').textContent = desc;
            document.getElementById('weatherCity').textContent = city;
            // 简单图标映射
            const iconMap = { '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️' };
            document.getElementById('weatherIcon').textContent = iconMap[iconCode] || '🌡️';
            // 穿衣推荐
            let clothes = '';
            if (temp >= 28) clothes = '天气炎热，建议穿短袖、短裤，注意防晒';
            else if (temp >= 22) clothes = '舒适温暖，建议穿单层棉麻面料的T恤、薄长裤';
            else if (temp >= 15) clothes = '有点凉，建议穿长袖衬衫、薄外套';
            else if (temp >= 8) clothes = '较冷，建议穿毛衣、厚外套';
            else clothes = '寒冷，建议穿羽绒服、棉衣';
            if (desc.includes('雨')) clothes += '，记得带伞';
            document.getElementById('clothesTip').textContent = clothes;
        }
        fetchWeather();

        // ---------- 喝水打卡 ----------
        const cupsContainer = document.getElementById('cupsContainer');
        const waterCountDisplay = document.getElementById('waterCountDisplay');
        let waterCount = parseInt(localStorage.getItem('waterCount') || '0');
        function renderCups() {
            cupsContainer.innerHTML = '';
            for (let i=0; i<8; i++) {
                const cup = document.createElement('span');
                cup.classList.add('cup');
                cup.innerHTML = '<i class="fas fa-glass-whiskey"></i>';
                if (i < waterCount) cup.classList.add('filled');
                cup.addEventListener('click', ()=>{
                    waterCount = i+1;
                    localStorage.setItem('waterCount', waterCount);
                    renderCups();
                });
                cupsContainer.appendChild(cup);
            }
            waterCountDisplay.textContent = `${waterCount}/8`;
        }
        renderCups();

        // ---------- 心情仪表 (略，与之前相同) ----------
        const canvas = document.getElementById('moodGauge');
        const ctx = canvas.getContext('2d');
        const moodSlider = document.getElementById('moodSlider');
        const moodPercent = document.getElementById('moodPercent');
        const moodCategory = document.getElementById('moodCategory');
        const lastMoodNote = document.getElementById('lastMoodNote');
        function getMoodCategory(val){ if(val<=10)return'😞 不开心'; if(val<=30)return'😐 一般'; if(val<=50)return'🙂 不错'; if(val<=70)return'😊 开心'; return'✨ 完美'; }
        function drawGauge(val){
            const w=120,h=60; canvas.width=w; canvas.height=h; ctx.clearRect(0,0,w,h);
            const cx=60,cy=50,r=32;
            ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,2*Math.PI,false); ctx.lineWidth=9; ctx.strokeStyle='#f5ddd2'; ctx.stroke();
            const endAngle = Math.PI + (val/100)*Math.PI;
            const grad=ctx.createLinearGradient(10,20,110,20); grad.addColorStop(0,'#d99b8a'); grad.addColorStop(0.6,'#e6b19e');
            ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,endAngle,false); ctx.lineWidth=9; ctx.strokeStyle=grad; ctx.stroke();
            const pAngle = Math.PI + (val/100)*Math.PI;
            const tipX=cx+Math.cos(pAngle)*22, tipY=cy+Math.sin(pAngle)*22;
            ctx.beginPath(); ctx.moveTo(tipX,tipY); ctx.lineTo(cx-6,cy-2); ctx.lineTo(cx-6,cy+2); ctx.closePath();
            ctx.fillStyle='#8b5e4b'; ctx.shadowColor='#dbb6a8'; ctx.shadowBlur=6; ctx.fill(); ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(cx,cy,6,0,2*Math.PI); ctx.fillStyle='#a67b6a'; ctx.fill();
        }
        function updateMood(val){ moodPercent.textContent=val+'%'; moodCategory.textContent=getMoodCategory(val); drawGauge(val); localStorage.setItem('lastMoodValue',val); }
        moodSlider.addEventListener('input',e=>updateMood(parseInt(e.target.value,10)));
        const savedMood = localStorage.getItem('lastMoodValue');
        if(savedMood){ moodSlider.value=savedMood; updateMood(parseInt(savedMood,10)); lastMoodNote.textContent=`✨ ${LAST_MOOD_TEXT} (上次 ${savedMood}%)`; } else updateMood(72);

        // 用餐切换
        document.querySelectorAll('.toggle-group').forEach(g=>{ const btns=g.querySelectorAll('.toggle-btn'); btns.forEach(b=>b.addEventListener('click',function(){ btns.forEach(btn=>btn.classList.remove('active')); this.classList.add('active'); })); });
        const nightCheck = document.getElementById('nightSnackCheck'); const nightDetail = document.getElementById('nightSnackDetail');
        nightCheck.addEventListener('change',e=>{ nightDetail.disabled=!e.target.checked; if(!e.target.checked) nightDetail.value=''; });

        // 本地存储日历等 (保持原有逻辑)
        function getReportedDates(){ const s=localStorage.getItem('reportedDates'); return s?JSON.parse(s):[]; }
        function addReportedDate(ds){ const dates=getReportedDates(); if(!dates.includes(ds)){ dates.push(ds); localStorage.setItem('reportedDates',JSON.stringify(dates)); } updateStreakAndCalendar(); }
        function updateStreakAndCalendar(){
            const dates=getReportedDates(); const count=dates.length;
            document.getElementById('streakDisplay').textContent = `${STREAK_TEXT.replace('🌱','')} (累计${count}天)`;
            renderCalendar(dates);
        }
        function renderCalendar(reportedDates){
            const year=today.getFullYear(), month=today.getMonth();
            const firstDay=new Date(year,month,1).getDay(), daysInMonth=new Date(year,month+1,0).getDate();
            const grid=document.getElementById('calendarGrid'); grid.innerHTML='';
            ['日','一','二','三','四','五','六'].forEach(w=>{ const d=document.createElement('div'); d.textContent=w; d.style.fontWeight='600'; grid.appendChild(d); });
            for(let i=0;i<firstDay;i++){ const empty=document.createElement('div'); grid.appendChild(empty); }
            for(let day=1;day<=daysInMonth;day++){
                const div=document.createElement('div'); div.textContent=day; div.classList.add('cal-day');
                const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                if(reportedDates.includes(ds)) div.classList.add('checked');
                if(day===today.getDate()) div.style.boxShadow='0 0 0 2px #d48d7a';
                grid.appendChild(div);
            }
        }
        updateStreakAndCalendar();

        // 提交逻辑 (带动画)
        const submitBtn = document.getElementById('submitReportBtn');
        const formStatus = document.getElementById('formStatus');
        const overlay = document.getElementById('successOverlay');
        const FORMSPREE_ENDPOINT = 'https://formspree.io/f/{你的表单ID}';

        function getMealStatus(meal){
            const group = document.querySelector(`.toggle-group[data-meal="${meal}"]`);
            if(!group) return '未知';
            const active = group.querySelector('.toggle-btn.active');
            return active ? active.dataset.value : 'yes';
        }

        submitBtn.addEventListener('click', async (e)=>{
            e.preventDefault();
            const moodVal = parseInt(moodSlider.value,10);
            const breakfastStatus = getMealStatus('breakfast')==='yes'?'已吃':'未吃';
            const lunchStatus = getMealStatus('lunch')==='yes'?'已吃':'未吃';
            const dinnerStatus = getMealStatus('dinner')==='yes'?'已吃':'未吃';
            const nightSnackStatus = nightCheck.checked ? '吃了夜宵' : '无夜宵';
            const breakfastDetail = document.getElementById('breakfastDetail').value.trim()||'未填写';
            const lunchDetail = document.getElementById('lunchDetail').value.trim()||'未填写';
            const dinnerDetail = document.getElementById('dinnerDetail').value.trim()||'未填写';
            const nightDetailText = nightCheck.checked ? (nightDetail.value.trim()||'未填写') : '无';
            const whisper = document.getElementById('whisperMessage').value.trim()||'（没有留下悄悄话）';
            const dateStr = `${y}.${m}.${d} ${wd}`;
            const moodText = `${moodVal}% (${getMoodCategory(moodVal)})`;
            const waterMsg = `喝水 ${waterCount}/8 杯`;

            addReportedDate(todayStr);
            const fortune = FORTUNE_MESSAGES[Math.floor(Math.random()*FORTUNE_MESSAGES.length)];

            // 动画
            overlay.style.opacity = '1';
            overlay.style.pointerEvents = 'none';
            setTimeout(()=>{ overlay.style.opacity = '0'; }, 1200);

            if (FORMSPREE_ENDPOINT.includes('{你的表单ID}')) {
                formStatus.innerHTML = `🔮 幸运签：${fortune}`;
                alert(`✨ 演示模式 ✨\n日期:${dateStr}\n心情:${moodText}\n${waterMsg}\n早餐:${breakfastStatus} ${breakfastDetail}\n午餐:${lunchStatus} ${lunchDetail}\n晚餐:${dinnerStatus} ${dinnerDetail}\n夜宵:${nightSnackStatus} ${nightDetailText}\n悄悄话:${whisper}`);
                return;
            }
            formStatus.textContent = '💭 发送中...';
            const emailBody = `【奥力给汇报】${dateStr}\n😊心情: ${moodText}\n💧${waterMsg}\n🍽️早餐: ${breakfastStatus} — ${breakfastDetail}\n🍱午餐: ${lunchStatus} — ${lunchDetail}\n🍛晚餐: ${dinnerStatus} — ${dinnerDetail}\n🌙夜宵: ${nightSnackStatus} — ${nightDetailText}\n💬悄悄话: ${whisper}`;
            try{
                const res = await fetch(FORMSPREE_ENDPOINT, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ _subject: `🏀汇报 ${dateStr}`, 汇报内容: emailBody }) });
                if(res.ok) formStatus.innerHTML = `🔮 幸运签：${fortune}`;
                else throw new Error();
            }catch(err){ formStatus.textContent = '❌ 发送失败'; }
        });
    })();
</script>
</body>
</html>
